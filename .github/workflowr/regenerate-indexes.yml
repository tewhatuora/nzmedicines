regeneraname: Regenerate Medication Indexes

on:
  push:
    branches: [main]
    paths:
      - 'medications/**/*.json'
  workflow_dispatch:
    inputs:
      folder:
        description: 'Specific MP folder to rebuild (e.g. 10194111000116109-warfarin). Leave blank to rebuild all.'
        required: false
        default: ''

jobs:
  regenerate:
    name: Rebuild _index.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine folders to rebuild
        id: folders
        run: |
          if [ -n "${{ github.event.inputs.folder }}" ]; then
            # Manual dispatch — rebuild the specified folder
            echo "medications/${{ github.event.inputs.folder }}" > folders.txt

          elif [ "${{ github.event_name }}" = "push" ]; then
            # Push — rebuild only folders containing changed files
            git diff --name-only HEAD~1 HEAD -- 'medications/**/*.json' \
              | grep -v '_index.json' \
              | awk -F'/' '{print $1"/"$2}' \
              | sort -u \
              > folders.txt
          fi

          echo "Folders to rebuild:"
          cat folders.txt

      - name: Rebuild indexes
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from collections import defaultdict
          from pathlib import Path
          from datetime import datetime, timezone

          def rebuild_index(folder: Path):
              # Collect all collection bundle files, ignore _prefixed files
              bundle_files = sorted(
                  f.name for f in folder.glob("*.json")
                  if not f.name.startswith("_")
              )
              if not bundle_files:
                  print(f"  No bundle files found in {folder}, skipping")
                  return

              all_resources = {}   # id → resource
              nzmt_type_map = {}   # id → nzmt type code
              source_file_map = {} # id → filename it came from

              for fname in bundle_files:
                  bundle = json.loads((folder / fname).read_text())
                  if bundle.get("type") != "collection":
                      continue
                  for entry in bundle.get("entry", []):
                      r = entry["resource"]
                      rid = r["id"]
                      all_resources[rid] = r
                      source_file_map[rid] = fname
                      for ext in r.get("extension", []):
                          if ext.get("url", "").endswith("nzf-nzmt-type"):
                              nzmt_type_map[rid] = \
                                  ext["valueCodeableConcept"]["coding"][0]["code"]

              if not all_resources:
                  print(f"  No resources found in {folder}, skipping")
                  return

              # Build forward edges from nzf-related-medication
              edges = defaultdict(lambda: defaultdict(list))
              for rid, resource in all_resources.items():
                  for ext in resource.get("extension", []):
                      if not ext.get("url", "").endswith("nzf-related-medication"):
                          continue
                      sub = {e["url"]: e for e in ext.get("extension", [])}
                      target_code = sub["code"]["valueCodeableConcept"]["coding"][0]["code"]
                      target_type = sub["type"]["valueCodeableConcept"]["coding"][0]["code"]
                      if target_code not in edges[rid][target_type]:
                          edges[rid][target_type].append(target_code)

              def name_of(rid):
                  r = all_resources.get(rid, {})
                  return r.get("code", {}).get("coding", [{}])[0].get("display", rid)

              def get_ext_value(resource, url_suffix, path):
                  """Walk a dotted path into the first matching extension."""
                  for ext in resource.get("extension", []):
                      if ext.get("url", "").endswith(url_suffix):
                          obj = ext
                          for key in path.split("."):
                              if isinstance(obj, dict):
                                  obj = obj.get(key)
                              else:
                                  obj = None
                                  break
                          if obj is not None:
                              return obj
                  return None

              def extra_codes(rid):
                  """Return GTINs and pharmacodes from a CTPP's code.coding array."""
                  r = all_resources.get(rid, {})
                  gtins, primary_pharm, other_pharm = [], None, []
                  for coding in r.get("code", {}).get("coding", []):
                      sys = coding.get("system", "")
                      code = coding.get("code", "")
                      if "gs1" in sys:
                          gtins.append(code)
                      elif "pharmac-subsidy-code" in sys:
                          is_primary = any(
                              e.get("valueBoolean")
                              for e in coding.get("extension", [])
                              if "is-primary" in e.get("url", "")
                          )
                          if is_primary:
                              primary_pharm = code
                          else:
                              other_pharm.append(code)
                  result = {}
                  if gtins:         result["gtins"]            = gtins
                  if primary_pharm: result["primaryPharmacode"] = primary_pharm
                  if other_pharm:   result["otherPharmacode"]   = other_pharm
                  return result

              def funding_types_of(rid):
                  r = all_resources.get(rid, {})
                  types = []
                  for ext in r.get("extension", []):
                      url = ext.get("url", "")
                      if url.endswith("nzf-funding") and "rule" not in url:
                          for sub in ext.get("extension", []):
                              if sub.get("url") == "type":
                                  code = (sub.get("valueCodeableConcept", {})
                                             .get("coding", [{}])[0]
                                             .get("code"))
                                  if code and code not in types:
                                      types.append(code)
                  return types

              by_type = defaultdict(list)
              for rid in all_resources:
                  by_type[nzmt_type_map.get(rid, "?")].append(rid)

              mp_ids = by_type.get("mp", [])
              if not mp_ids:
                  print(f"  No MP resource found in {folder}, skipping")
                  return
              mp_id = mp_ids[0]
              mp_resource = all_resources[mp_id]

              index = {
                  "_generated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "_description": (
                      f"Relationship index for {name_of(mp_id)} ({mp_id}). "
                      "Auto-generated — do not edit."
                  ),
                  "_sourceFiles": bundle_files,

                  "mp": {
                      "id":     mp_id,
                      "name":   name_of(mp_id),
                      "atc":    get_ext_value(
                                    mp_resource, "nzf-atc",
                                    "valueCodeableConcept.coding.0.code"),
                      "snomed": next(
                                    (c["code"] for c in
                                     mp_resource.get("code", {}).get("coding", [])
                                     if "snomed" in c.get("system", "")),
                                    None),
                      "synonyms": [
                          e["term"]["valueCodeableConcept"]["text"]
                          for ext in mp_resource.get("extension", [])
                          if ext.get("url", "").endswith("nzf-description")
                          for e in [dict(
                              (sub["url"], sub)
                              for sub in ext.get("extension", [])
                          )]
                          if e.get("type", {})
                              .get("valueCodeableConcept", {})
                              .get("text", "") == "Synonym"
                          for term in [e.get("term", {})]
                          if term
                      ],
                      "monographs": {
                          link["identifier"]["value"]: link["identifier"]["value"]
                          for ext in mp_resource.get("extension", [])
                          if ext.get("url", "").endswith("nzf-link")
                          for link in [ext.get("valueReference", {})]
                          if link.get("identifier")
                      }
                  },

                  "generics": {
                      "mpuus": [
                          {
                              "id":              rid,
                              "name":            name_of(rid),
                              "sourceFile":      source_file_map.get(rid),
                              "isPrescribeByBrand": get_ext_value(
                                  all_resources[rid],
                                  "nzf-prescribe-by-brand",
                                  "valueBoolean"),
                              "relatedMpps":     edges[rid].get("mpp", [])
                          }
                          for rid in sorted(by_type["mpuu"], key=name_of)
                      ],
                      "mpps": [
                          {
                              "id":          rid,
                              "name":        name_of(rid),
                              "sourceFile":  source_file_map.get(rid),
                              "relatedMpuu": edges[rid].get("mpuu", [])
                          }
                          for rid in sorted(by_type["mpp"], key=name_of)
                      ]
                  },

                  "brands": [
                      {
                          "tp": {
                              "id":         tp_id,
                              "name":       name_of(tp_id),
                              "sourceFile": source_file_map.get(tp_id)
                          },
                          "tpuus": [
                              {
                                  "id":           tpuu_id,
                                  "name":         name_of(tpuu_id),
                                  "relatedMpuu":  edges[tpuu_id].get("mpuu", []),
                                  "relatedTpp":   edges[tpuu_id].get("tpp",  [])
                              }
                              for tpuu_id in sorted(by_type["tpuu"], key=name_of)
                              if tp_id in edges[tpuu_id].get("tp", [])
                          ],
                          "products": [
                              {
                                  "ctpp":         ctpp_id,
                                  "name":         name_of(ctpp_id),
                                  "tpp":          edges[ctpp_id].get("tpp",  [None])[0],
                                  "tpuu":         edges[ctpp_id].get("tpuu", [None])[0],
                                  "mpp":          edges[ctpp_id].get("mpp",  [None])[0],
                                  "mpuu":         edges[ctpp_id].get("mpuu", [None])[0],
                                  "fundingTypes": funding_types_of(ctpp_id),
                                  **extra_codes(ctpp_id)
                              }
                              for ctpp_id in sorted(by_type["ctpp"], key=name_of)
                              if tp_id in edges[ctpp_id].get("tp", [])
                          ]
                      }
                      for tp_id in sorted(by_type["tp"], key=name_of)
                  ],

                  # Flat lookup: every NZMT ID in this folder → type + name + source file
                  "_lookup": {
                      rid: {
                          "type":       nzmt_type_map.get(rid, "?"),
                          "name":       name_of(rid),
                          "sourceFile": source_file_map.get(rid)
                      }
                      for rid in sorted(all_resources)
                  }
              }

              out = folder / "_index.json"
              out.write_text(json.dumps(index, indent=2) + "\n")
              n = len(all_resources)
              print(f"  ✓ {out}  ({n} resources across {len(bundle_files)} files)")

          # ── Read folder list written by the previous step ─────────────────
          folders_file = "folders.txt"
          if not os.path.exists(folders_file):
              print("No folders.txt found — nothing to rebuild")
              sys.exit(0)

          with open(folders_file) as fh:
              folders = [line.strip() for line in fh if line.strip()]

          if not folders:
              print("No folders listed — nothing to rebuild")
              sys.exit(0)

          for folder_path in folders:
              p = Path(folder_path)
              if not p.is_dir():
                  print(f"  Skipping {folder_path} (not a directory)")
                  continue
              print(f"Rebuilding index for {folder_path}")
              rebuild_index(p)

          PYEOF

      - name: Commit updated indexes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add medications/**/_index.json
          if git diff --staged --quiet; then
            echo "No index changes to commit"
          else
            git commit -m "chore: regenerate _index.json [skip ci]"
            git push
            echo "Indexes committed and pushed"
          fi
